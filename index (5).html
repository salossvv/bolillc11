<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BOLI, LLC — Property Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
/* All theme colors are injected via JS into :root so they work in every context */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Mono','Courier New',monospace;min-height:100vh;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg3);}::-webkit-scrollbar-thumb{background:var(--bd3);}

.header{border-bottom:1px solid var(--bd);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;background:var(--bg);}
.header-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--tx);}
.header-sub{font-size:10px;color:var(--tx5);letter-spacing:2.5px;margin-top:3px;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:10px;}

.theme-btn{background:var(--bg2);border:1px solid var(--bd2);color:var(--tx3);font-size:16px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s,border-color .2s;}
.theme-btn:hover{border-color:var(--bd3);transform:scale(1.1);}

.btn-add{background:var(--pri-bg);color:var(--pri-fg);border:none;font-family:inherit;font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;padding:10px 20px;cursor:pointer;border-radius:3px;transition:opacity .15s;}
.btn-add:hover{opacity:.82;}
.btn-ghost{background:transparent;border:1px solid var(--bd3);color:var(--tx3);font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:9px 18px;cursor:pointer;border-radius:3px;transition:all .15s;}
.btn-ghost:hover{border-color:var(--tx4);color:var(--tx2);}
.btn-save{background:var(--pri-bg);color:var(--pri-fg);border:none;font-family:inherit;font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;padding:10px 22px;cursor:pointer;border-radius:3px;transition:opacity .15s;}
.btn-save:hover{opacity:.82;}
.btn-icon{background:none;border:none;cursor:pointer;color:var(--tx5);font-size:13px;padding:3px 5px;transition:color .15s;}
.btn-icon:hover{color:var(--tx2);}

.unit-tabs{padding:16px 28px 0;display:flex;gap:8px;flex-wrap:wrap;}
.tab{padding:7px 14px;border:1px solid var(--bd3);background:transparent;color:var(--tx3);font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:all .15s;border-radius:3px;cursor:pointer;}
.tab:hover{border-color:var(--tx4);color:var(--tx2);}
.tab.active{background:var(--bg4);color:var(--tx);border-color:var(--tx5);}
.tab-amt{margin-left:6px;font-size:10px;color:var(--tx4);}

.main-grid{padding:22px 28px;display:grid;grid-template-columns:1fr 290px;gap:22px;}
@media(max-width:820px){.main-grid{grid-template-columns:1fr;}}

.view-toggle{display:flex;border:1px solid var(--bd2);border-radius:4px;overflow:hidden;width:fit-content;margin-bottom:18px;}
.view-btn{background:transparent;border:none;border-right:1px solid var(--bd2);color:var(--tx5);font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:7px 18px;cursor:pointer;transition:all .15s;}
.view-btn:last-child{border-right:none;}
.view-btn.active{background:var(--bg4);color:var(--tx);}

.unit-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
@media(max-width:600px){.unit-cards{grid-template-columns:1fr 1fr;}}
.unit-card{background:var(--bg2);padding:14px;cursor:pointer;border-radius:4px;border:1px solid transparent;transition:border-color .15s;}
.unit-card-total{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;color:var(--tx);margin-top:6px;}
.unit-card-count{font-size:10px;color:var(--tx5);margin-top:3px;}

.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.sel-in{background:var(--in-bg);border:1px solid var(--bd2);color:var(--tx);font-family:inherit;font-size:12px;padding:9px 12px;outline:none;border-radius:3px;cursor:pointer;transition:border-color .15s;appearance:none;}
.sel-in:focus{border-color:var(--tx5);}
.sel-in option{background:var(--opt-bg);color:var(--tx);}

.expense-row{background:var(--bg2);border:1px solid var(--bd);border-radius:4px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:border-color .15s;margin-bottom:5px;}
.expense-row:hover{border-color:var(--bd3);}
.exp-desc{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx);}
.exp-meta{font-size:10px;color:var(--tx5);margin-top:2px;}
.exp-amount{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--ac);flex-shrink:0;}
.exp-actions{display:flex;gap:2px;flex-shrink:0;}

.totals-bar{margin-top:4px;padding:11px 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:4px;display:flex;justify-content:space-between;align-items:center;}
.totals-label{font-size:10px;letter-spacing:1.5px;color:var(--tx4);text-transform:uppercase;}
.totals-amount{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--ac);}

.card{background:var(--bg2);border:1px solid var(--bd);border-radius:4px;padding:18px;margin-bottom:14px;}
.card:last-child{margin-bottom:0;}
.card-title{font-size:10px;letter-spacing:2px;color:var(--tx4);text-transform:uppercase;margin-bottom:14px;}
.bar-track{height:3px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:5px;}
.bar-fill{height:3px;border-radius:2px;transition:width .4s;}

.month-block{background:var(--bg2);border:1px solid var(--bd);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.month-block.current{border-color:var(--cur-bd);}
.month-header{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s;user-select:none;}
.month-header:hover{background:var(--bg3);}
.month-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.month-badge{font-size:8px;letter-spacing:1.5px;color:var(--ac2);border:1px solid var(--cur-bd);padding:2px 6px;border-radius:20px;text-transform:uppercase;margin-left:9px;}
.month-count{font-size:10px;color:var(--tx5);margin-left:9px;}
.month-total{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--ac);}
.month-chevron{color:var(--tx5);font-size:10px;margin-left:12px;display:inline-block;transition:transform .2s;}
.month-unit-bar{padding:9px 16px;display:flex;gap:14px;border-top:1px solid var(--bd);flex-wrap:wrap;background:var(--bg3);}
.month-body{padding:7px 8px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:4px;}
.grand-total{padding:13px 16px;background:var(--bg3);border:1px solid var(--bd2);border-radius:4px;display:flex;justify-content:space-between;align-items:center;margin-top:4px;}

.overlay{position:fixed;inset:0;background:var(--ov);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:var(--mo-bg);border:1px solid var(--bd2);padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;border-radius:4px;box-shadow:0 20px 60px var(--sh);}
.modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;
